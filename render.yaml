services:
  - type: web
    name: jobbot-lilian
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PORT
        value: 10000
      - key: FRANCE_TRAVAIL_CLIENT_ID
        sync: false
      - key: FRANCE_TRAVAIL_CLIENT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
    plan: free
    healthCheckPath: /api/stats
